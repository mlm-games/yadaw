name: Publish to Chocolatey

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 0.1.2)'
        required: true

jobs:
  publish-chocolatey:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download windows build from release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $VERSION = "${{ inputs.version_name }}" -replace '^v', ''
          mkdir -p choco-package

          # Try both with and without 'v' prefix for release tag
          $downloaded = $false
          foreach ($tag in @("v$VERSION", "$VERSION")) {
            $url = "https://github.com/mlm-games/yadaw/releases/download/${tag}/yadaw-${VERSION}-x86_64-pc-windows-gnu.zip"
            try {
              $request = [System.Net.WebRequest]::Create($url)
              $request.Method = "HEAD"
              $response = $request.GetResponse()
              $response.Close()
              Write-Output "Found asset at tag $tag"
              Invoke-WebRequest -Uri $url -OutFile "choco-package/yadaw-${VERSION}-x86_64-pc-windows-gnu.zip"
              $downloaded = $true
              break
            } catch {
              continue
            }
          }

          if (-not $downloaded) {
            throw "Failed to download Windows build"
          }

          # Extract yadaw.exe from the zip
          Expand-Archive -Path "choco-package/yadaw-${VERSION}-x86_64-pc-windows-gnu.zip" -DestinationPath "choco-package/extracted" -Force
          Copy-Item "choco-package/extracted/yadaw-${VERSION}-x86_64-pc-windows-gnu/yadaw.exe" "choco-package/yadaw.exe"
          Remove-Item "choco-package/yadaw-${VERSION}-x86_64-pc-windows-gnu.zip" -Force
          Remove-Item "choco-package/extracted" -Recurse -Force

      - name: List downloaded files
        shell: pwsh
        run: |
          Write-Output "Files in choco-package:"
          Get-ChildItem -Path ".\choco-package" -Recurse

      - name: Generate checksums if missing
        shell: pwsh
        run: |
          if (-not (Test-Path ".\choco-package\SHA256SUMS.txt")) {
            Write-Output "SHA256SUMS.txt not found, generating checksums..."
            $files = Get-ChildItem -Path ".\choco-package" -File
            $checksumContent = @()
            $checksumContent += "# SHA256 Checksums for Windows Desktop"
            $checksumContent += "Generated on $(Get-Date)"
            $checksumContent += ""

            foreach ($file in $files) {
              $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
              $checksumContent += "$($hash.Hash.ToLower())  $($file.Name)"
              Write-Output "File: $($file.Name)"
              Write-Output "SHA256: $($hash.Hash.ToLower())"
            }

            $checksumContent | Out-File -FilePath ".\choco-package\SHA256SUMS.txt" -Encoding UTF8
          }

      - name: Setup Chocolatey
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: -v

      - name: Update Chocolatey nuspec version and install script
        shell: pwsh
        run: |
          $VERSION = "${{ inputs.version_name }}" -replace '^v', ''
          $TAG = "v$VERSION"

          # Update nuspec version
          $nuspecPath = ".\chocolatey\yadaw.nuspec"
          $content = Get-Content $nuspecPath
          $content = $content -replace "<version>.*</version>", "<version>$VERSION</version>"
          $content | Set-Content $nuspecPath

          # Get the SHA256 hash from the checksums file
          $checksumFile = Get-Content ".\choco-package\SHA256SUMS.txt"
          $exeFileName = "yadaw.exe"
          $hashLine = $checksumFile | Where-Object { $_ -match "$exeFileName$" }
          if ($hashLine) {
            $hash = ($hashLine -split '\s+')[0]
            Write-Output "Found hash: $hash for $exeFileName"
          } else {
            Write-Error "Could not find hash for $exeFileName in SHA256SUMS.txt"
            Write-Output "Available files in checksums:"
            $checksumFile | ForEach-Object { Write-Output $_ }
            exit 1
          }

          # Update the chocolateyinstall.ps1 file
          $installPath = ".\chocolatey\tools\chocolateyinstall.ps1"
          $content = Get-Content $installPath
          $content = $content -replace "url\s*=\s*'.*'", "url = 'https://github.com/mlm-games/yadaw/releases/download/${TAG}/yadaw.exe'"
          $content = $content -replace "checksum\s*=\s*'.*'", "checksum = '$hash'"
          $content | Set-Content $installPath

          Write-Output "Updated chocolateyinstall.ps1 with new URL and checksum"

      - name: Pack and push Chocolatey package
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $VERSION = "${{ inputs.version_name }}" -replace '^v', ''
          choco pack .\chocolatey\yadaw.nuspec
          choco push yadaw.$VERSION.nupkg --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
