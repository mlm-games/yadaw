name: CI
on:
  pull_request:
  push:
    branches: '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"

jobs:
  check-and-test:
    name: Check, lint, test (stable)
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          # - os: windows-latest
          #   toolchain: stable-x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4


      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config
      - name: Configure pkg-config (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      # - name: Format
      #   run: cargo fmt --all --check

      # - name: Clippy
      #   run: cargo clippy --all-targets --all-features

      # - name: Install nextest
      #   uses: taiki-e/install-action@v2
      #   with: { tool: nextest }

      # - name: Test (nextest)
      #   run: cargo nextest run --workspace --all-features

  msrv:
    name: MSRV
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config

      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features

  minimal-versions:
    name: Minimal versions build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with: { tool: cargo-hack }

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config

      - uses: Swatinem/rust-cache@v2
      - run: cargo generate-lockfile -Z minimal-versions || true
      - run: cargo hack build --workspace --all-features --ignore-private --no-dev-deps

  # security:
  #   name: Security & licensing
  #   continue-on-error: true
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: EmbarkStudios/cargo-deny-action@v2
  #     - uses: actions-rust-lang/audit@v1
  #       with:
  #         denyWarnings: true
  #       continue-on-error: true

  semver:
    name: SemVer checks (pre-publish)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  android-apk:
    name: Android (${{ matrix.abi }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
          - target: i686-linux-android
            abi: x86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and NDK
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-rapk
        run: cargo install cargo-rapk --locked

      - name: Build Android APK
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.repository.pushed_at || 0 }}
        run: |
          cargo rapk build --target ${{ matrix.target }} --lib
          OUT_DIR="target/${{ matrix.target }}/debug/apk"
          if [ -d "target/${{ matrix.target }}/release/apk" ]; then
            OUT_DIR="target/${{ matrix.target }}/release/apk"
          fi
          ls -l "$OUT_DIR"
          mkdir -p artifacts
          cp "$(ls -1t "$OUT_DIR"/*.apk | head -n1)" "artifacts/app-${{ matrix.abi }}.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: artifacts/*.apk
