name: Publish to Snapcraft

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 0.4.4)'
        required: true

concurrency:
  group: snap-${{ inputs.version_name }}
  cancel-in-progress: false

env:
  BIN_NAME: yadaw  # Set your binary name here

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preflight | Check release tag
        run: |
          VERSION="${{ inputs.version_name }}"
          VERSION="${VERSION#v}"
          for TAG in "v$VERSION" "$VERSION"; do
            if curl --output /dev/null --silent --head --fail \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}"; then
              echo "Found release tag: $TAG"
              exit 0
            fi
          done
          echo "Release tag not found (tried: v$VERSION, $VERSION)" >&2
          exit 1

      - name: Preflight | Check secret
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        run: |
          [ -n "$SNAPCRAFT_STORE_CREDENTIALS" ] || { echo "Missing secret SNAPCRAFT_TOKEN" >&2; exit 1; }

      - name: Fetch Linux binary (from tar.gz)
        run: |
          set -euo pipefail
          mkdir -p others/snap/builds others/snap/snap/gui

          # Copy desktop and icon files
          cp others/flathub/io.github.mlm_games.yadaw.desktop others/snap/snap/gui/yadaw.desktop
          cp fastlane/metadata/android/en-US/images/icon.png others/snap/snap/gui/icon.png
          sed -i -e 's|^Exec=.*|Exec=yadaw|' \
                 -e 's|^Icon=.*|Icon=${SNAP}/meta/gui/icon.png|' \
                 others/snap/snap/gui/yadaw.desktop

          VERSION="${{ inputs.version_name }}"
          VERSION="${VERSION#v}"  # normalize
          TARGET="x86_64-unknown-linux-gnu"
          TAR_GZ_FILE="${{ env.BIN_NAME }}-${VERSION}-${TARGET}.tar.gz"

          # Try both with and without 'v' prefix for release tag
          DOWNLOADED=false
          for TAG in "v$VERSION" "$VERSION"; do
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${TAR_GZ_FILE}"
            if curl --output /dev/null --silent --head --fail "$URL"; then
              curl -fL "$URL" -o /tmp/app.tar.gz
              DOWNLOADED=true
              break
            fi
          done

          if [[ "$DOWNLOADED" != "true" ]]; then
            echo "Failed to download tarball" >&2
            exit 1
          fi

          # Extract tar.gz and copy binary
          mkdir -p /tmp/app_extract
          tar -xzf /tmp/app.tar.gz -C /tmp/app_extract
          cp "/tmp/app_extract/${{ env.BIN_NAME }}-${VERSION}-${TARGET}/${{ env.BIN_NAME }}" "others/snap/builds/${{ env.BIN_NAME }}"
          chmod +x others/snap/builds/${{ env.BIN_NAME }}


      - name: Update version in snapcraft.yml
        run: |
          VERSION="${{ inputs.version_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: '$VERSION'/" others/snap/snapcraft.yaml
          echo "others/snap/snapcraft.yaml version updated"

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build
        with:
          path: others/snap

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
